stages:
  - build
  - test
  - deploy

build-job:
  stage: build
  image: node:20
  script:
    - npm install
    - npm run build

test-job:
  stage: test
  image: node:20
  needs:
    - build-job
  script:
    - npm test

deploy-job:
  stage: deploy
  image: node:20
  needs:
    - test-job
  script:
    - echo "deploying"
